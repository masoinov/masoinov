<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>привет бро</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          font-family: 'Montserrat', Arial, sans-serif;
          background: #000;
          color: #fff;
          text-align: center;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          justify-content: flex-start;
          padding: 20px;
          margin: 0;
          overflow-x: hidden;
          position: relative;
          z-index: 1;
          /* один мягкий фиолетовый градиент, который следует за мышкой (чуть темнее) */
          background: radial-gradient(600px at var(--mouse-x, 50%) var(--mouse-y, 50%), #5a1ce1, #18181f, #050505) fixed;
          transition: background-position 0.15s ease-out;
        }

        .hero {
          position: relative;
          width: 100%;
          max-width: 800px;
          margin: 0 auto 40px;
          padding: 40px 30px;
          background: rgba(255, 255, 255, 0.08); /* чуть темнее, чем было */
          backdrop-filter: blur(12px);
          border-radius: 20px;
          border: 1px solid rgba(255, 255, 255, 0.2);
          box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35); /* чуть жёстче тень */
          overflow: hidden;
        }

        .hero::before {
          content: '';
          position: absolute;
          top: -50px;
          left: -50px;
          width: 200px;
          height: 200px;
          background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
          border-radius: 50%;
          pointer-events: none;
        }

        .hero::after {
          content: '';
          position: absolute;
          bottom: -30px;
          right: -30px;
          width: 150px;
          height: 150px;
          background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
          border-radius: 50%;
          pointer-events: none;
        }

        .profile-pic {
          position: relative;
          width: 140px;
          height: 140px;
          border-radius: 50%;
          border: 4px solid #fff;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
          margin: 0 auto 20px;
          overflow: hidden;
        }

        .profile-pic img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
        }

        @media (max-width: 480px) {
          .profile-pic {
            width: 120px;
            height: 120px;
          }
        }

        .status {
          margin-top: 10px;
          font-size: 0.9rem;
          color: #c5c5c5;
          text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        h1 {
          font-size: 2.5rem;
          font-weight: 700;
          color: #fff;
          margin-bottom: 15px;
          text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
          animation: fadeInUp 1s ease-out;
        }

        p {
          font-size: 1.3rem;
          margin-bottom: 20px;
          line-height: 1.6;
          animation: fadeInUp 1s ease-out 0.2s both;
        }

        .glow-text {
          color: #ff4d6d;
          background: linear-gradient(90deg, #ff4d6d, #ff8a80);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          text-shadow: 0 0 20px rgba(255, 77, 109, 0.3);
          font-weight: 600;
          font-size: 1.4rem;
          letter-spacing: 0.5px;
          animation: pulse 2s infinite;
        }

        h3 {
          color: #e0e0e0;
          font-size: 1.1rem;
          margin-top: 15px;
          font-weight: 400;
          animation: fadeInUp 1s ease-out 0.4s both;
        }

        .section-title {
          font-size: 1.4rem;
          font-weight: 600;
          color: #fff;
          margin: 30px 0 15px;
          text-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
        }

        .social-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 15px;
          margin-top: 20px;
          max-width: 500px;
          margin-left: auto;
          margin-right: auto;
        }

        .social-card {
          background: rgba(255, 255, 255, 0.12);
          border-radius: 16px;
          border: 1px solid rgba(255, 255, 255, 0.2);
          padding: 15px 10px;
          box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
          transition: all 0.3s ease;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          text-decoration: none;
        }

        .social-card:hover {
          transform: translateY(-4px);
          background: rgba(255, 255, 255, 0.18);
          box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        }

        .social-card i {
          font-size: 2rem;
          margin-bottom: 8px;
        }

        .social-card .platform {
          font-weight: 600;
          font-size: 1rem;
          color: #fff;
        }

        .social-card .nickname {
          font-size: 0.9rem;
          color: #d9d9d9;
          margin-top: 4px;
        }

        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(30px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes pulse {
          0% {
            box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7);
          }
          70% {
            box-shadow: 0 0 0 10px rgba(255, 77, 109, 0);
          }
          100% {
            box-shadow: 0 0 0 0 rgba(255, 77, 109, 0);
          }
        }

        @media (max-width: 768px) {
          .hero {
            padding: 25px 15px;
          }

          h1 {
            font-size: 2rem;
          }

          p, .glow-text, h3 {
            font-size: 1.1rem;
          }

          .social-grid {
            grid-template-columns: repeat(2, 1fr);
          }
        }

        @media (max-width: 480px) {
          body {
            padding: 10px;
          }

          .hero {
            padding: 15px 10px;
            border-radius: 15px;
          }

          h1 {
            font-size: 1.7rem;
          }

          .social-grid {
            grid-template-columns: 1fr;
          }
        }
    </style>
</head>
<body>
<div class="hero">
    <div class="profile-pic">
        <img src="https://i.pinimg.com/736x/d0/0b/50/d00b505b1b353947da7d78de711cd15b.jpg" alt="Аватарка">
    </div>

    <span class="status">онлайн</span>
    <h1>привет, это мой первый тест и т.д в базе кодировки</h1>
    <p>
      <span class="glow-text">
        я @masoinov в тг,@chinamoment в вк, @masoin08 в дс
      </span>
    </p>

    <div class="section-title">мои соцсети</div>
    <div class="social-grid">
        <a href="https://t.me/masoinov" target="_blank" class="social-card">
            <i class="fab fa-telegram"></i>
            <div class="platform">Telegram</div>
            <div class="nickname">@masoinov</div>
        </a>
        <a href="https://vk.com/chinamoment" target="_blank" class="social-card">
            <i class="fab fa-vk"></i>
            <div class="platform">VK</div>
            <div class="nickname">@chinamoment</div>
        </a>
        <a href="https://discordapp.com/users/masoinov" target="_blank" class="social-card">
            <i class="fab fa-discord"></i>
            <div class="platform">Discord</div>
            <div class="nickname">@masoin08</div>
        </a>
    </div>

    <!-- Кнопка для включения/выключения музыки была удалена -->
</div>

<!-- Скрипт для слежения фона за курсором -->
<script>
  function setMouseGrad(x, y) {
    document.body.style.setProperty('--mouse-x', x + 'px');
    document.body.style.setProperty('--mouse-y', y + 'px');
  }

  document.addEventListener('mousemove', (e) => {
    const x = e.clientX;
    const y = e.clientY;
    setMouseGrad(x, y);
  });

  // инициализация на случай, если есть тач‑девайсы
  if ('ontouchstart' in window) {
    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        const touch = e.touches[0];
        setMouseGrad(touch.clientX, touch.clientY);
      }
    });
  }
</script>
</body>
</html>
